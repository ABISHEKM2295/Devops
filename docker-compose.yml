# ═══════════════════════════════════════════════════════════════
# Docker Compose — DevOps Demo Stack
# CrowdFundIn App + Prometheus + Grafana
# ═══════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ── Backend Application ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crowdfundin-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/crowdfundin
      - JWT_SECRET=mysecretkey123
    restart: unless-stopped
    networks:
      - devops-network
    depends_on:
      - mongo

  # ── Frontend Application ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crowdfundin-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - devops-network
    depends_on:
      - backend

  # ── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: crowdfundin-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - devops-network

  # ── Prometheus (Monitoring) ─────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped
    networks:
      - devops-network
    depends_on:
      - backend

  # ── Grafana (Dashboards) ────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - devops-network
    depends_on:
      - prometheus

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:

networks:
  devops-network:
    driver: bridge

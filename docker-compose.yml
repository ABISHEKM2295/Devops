services:

  # ── Backend ────────────────────────────────────────────────
  # MongoDB Atlas is used — no local mongo container needed.
  backend:
    image: crowdfundin-backend:latest
    container_name: crowdfundin-backend
    ports:
      - "5000:5000"

    # backend/.env is written by the Jenkins pipeline (from a Secret file
    # credential) before docker compose up runs, so this is safe in CI.
    # For local dev: just have backend/.env on disk as usual.
    env_file:
      - ./backend/.env

    environment:
      PORT:      5000
      NODE_ENV:  production

    volumes:
      - backend-uploads:/app/uploads

    restart: unless-stopped
    networks:
      - devops-network

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s


  # ── Frontend ───────────────────────────────────────────────
  frontend:
    image: crowdfundin-frontend:latest
    container_name: crowdfundin-frontend
    ports:
      - "3000:8080"
    restart: unless-stopped
    networks:
      - devops-network
    depends_on:
      backend:
        condition: service_healthy


  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports:
      - "9090:9090"

    volumes:
      - prometheus-data:/prometheus
      - ./prometheus:/etc/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

    restart: unless-stopped
    networks:
      - devops-network
    depends_on:
      backend:
        condition: service_healthy


  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3001:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false

    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

    restart: unless-stopped
    networks:
      - devops-network
    depends_on:
      - prometheus


volumes:
  backend-uploads:
  prometheus-data:
  grafana-data:

networks:
  devops-network:
    driver: bridge